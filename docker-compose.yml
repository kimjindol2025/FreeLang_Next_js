version: "3.9"

services:
  # Django Backend (FreeLang API)
  django:
    build:
      context: ../Django_gogs/freelang_django
      dockerfile: Dockerfile
    container_name: freelang-django
    environment:
      DJANGO_SETTINGS_MODULE: config.settings_dev
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1,django,web"
      SECRET_KEY: "django-insecure-dev-key-change-in-production"
      POSTGRES_DB: freelang
      POSTGRES_USER: freelang
      POSTGRES_PASSWORD: freelang
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      FREELANG_COMPILER_PATH: /app/freelang/dist/main.js
      NODE_BINARY_PATH: /usr/local/bin/node
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000,http://web:3000"
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - db
    volumes:
      - ../Django_gogs/freelang_django:/app
      - /app/.next
    networks:
      - freelang-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/compile/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Next.js Frontend
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: freelang-next
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - django
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    networks:
      - freelang-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Redis (Channel Layer & Cache)
  redis:
    image: redis:7-alpine
    container_name: freelang-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - freelang-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # PostgreSQL (Production Database)
  db:
    image: postgres:16-alpine
    container_name: freelang-db
    environment:
      POSTGRES_DB: freelang
      POSTGRES_USER: freelang
      POSTGRES_PASSWORD: freelang
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - freelang-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freelang"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Nginx (Reverse Proxy - Optional)
  nginx:
    image: nginx:alpine
    container_name: freelang-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - django
    networks:
      - freelang-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  redis_data:

networks:
  freelang-network:
    driver: bridge
