# FreeLang Nginx Configuration
# Next.js + Django + WebSocket 통합

# Upstream 정의
upstream nextjs_backend {
  server web:3000;
}

upstream django_api {
  server django:8000;
}

# 메인 서버
server {
  listen 80 default_server;
  server_name _;

  # 버퍼 크기
  client_max_body_size 10M;
  proxy_buffer_size 128k;
  proxy_buffers 4 256k;

  # 로깅
  access_log /var/log/nginx/freelang_access.log;
  error_log /var/log/nginx/freelang_error.log warn;

  # 정적 파일 (Next.js public)
  location /_next/static {
    proxy_pass http://nextjs_backend;
    proxy_cache_valid 200 30d;
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  # Next.js API 라우트 + SSR
  location / {
    proxy_pass http://nextjs_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;
  }

  # Django API (Optional - 직접 접근 허용)
  # location /api/ {
  #   proxy_pass http://django_api;
  #   proxy_http_version 1.1;
  #   proxy_set_header Host $host;
  #   proxy_set_header X-Real-IP $remote_addr;
  #   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  #   proxy_set_header X-Forwarded-Proto $scheme;
  # }

  # WebSocket (Django Channels)
  # location /ws/ {
  #   proxy_pass http://django_api;
  #   proxy_http_version 1.1;
  #   proxy_set_header Upgrade $http_upgrade;
  #   proxy_set_header Connection "upgrade";
  #   proxy_set_header Host $host;
  #   proxy_set_header X-Real-IP $remote_addr;
  #   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  #   proxy_read_timeout 86400;
  # }

  # 헬스 체크
  location /health {
    return 200 "OK\n";
    add_header Content-Type text/plain;
  }
}
